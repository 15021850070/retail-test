<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adidas AI 补货 · 专业仪表板</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js">
    </script>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f4f6fa;
            color: #1a1a1a;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .dashboard {
            max-width: 1440px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 24px 28px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            transition: all 0.2s;
        }

        /* ===== 顶栏 ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f2f6;
            margin-bottom: 24px;
        }

        .brand-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: #fff;
            letter-spacing: -0.5px;
            position: relative;
        }
        .brand-icon span {
            position: relative;
            z-index: 1;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 12px;
            height: 12px;
            background: #e01a22;
            border-radius: 50%;
            opacity: 0.9;
        }
        .brand-name {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.3px;
        }
        .brand-name small {
            font-weight: 400;
            font-size: 14px;
            color: #718096;
            margin-left: 6px;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .city-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f5f7fa;
            padding: 4px 16px 4px 18px;
            border-radius: 100px;
            border: 1px solid #edf2f7;
        }
        .city-selector label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
        }
        .city-selector input[type="radio"] {
            accent-color: #e01a22;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .date-badge {
            font-size: 13px;
            color: #718096;
            background: #f5f7fa;
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 500;
        }

        /* ===== 北极星 KPI 区域 ===== */
        .polaris-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 18px 20px 20px;
            border: 1px solid #edf2f7;
            transition: 0.15s;
            position: relative;
        }
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }
        .kpi-card .label {
            font-size: 13px;
            font-weight: 500;
            color: #718096;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .kpi-card .value {
            font-size: 36px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .kpi-card .sub {
            font-size: 14px;
            color: #a0aec0;
            margin-top: 4px;
        }
        .kpi-card .sub .highlight {
            color: #e01a22;
            font-weight: 600;
        }
        .kpi-card .sub .positive {
            color: #2f855a;
        }
        .kpi-card .sub .negative {
            color: #e01a22;
        }

        /* 补销率专用样式 */
        .polaris-card {
            background: linear-gradient(145deg, #ffffff, #fafbfc);
            border: 1px solid #e01a22;
            box-shadow: 0 4px 20px rgba(224, 26, 34, 0.08);
        }
        .polaris-card .value {
            font-size: 48px;
            color: #e01a22;
        }
        .polaris-card .range-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        .polaris-card .range-bar {
            flex: 1;
            height: 6px;
            background: #edf2f7;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .polaris-card .range-bar .fill {
            height: 100%;
            background: #e01a22;
            border-radius: 10px;
            transition: width 0.6s ease;
        }
        .polaris-card .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a0aec0;
            margin-top: 2px;
        }
        .polaris-card .range-labels span:first-child {
            color: #2f855a;
        }
        .polaris-card .range-labels span:last-child {
            color: #e01a22;
        }

        /* ===== 图表行 ===== */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: #fafbfc;
            border-radius: 20px;
            padding: 16px 14px 10px;
            border: 1px solid #edf2f7;
        }
        .chart-card .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 6px;
            padding-left: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chart-card .chart-title .sub {
            font-weight: 400;
            font-size: 12px;
            color: #a0aec0;
        }
        .chart-container {
            width: 100%;
            height: 280px;
        }

        /* ===== 表格 ===== */
        .table-section {
            margin-top: 20px;
            background: #fafbfc;
            border-radius: 20px;
            padding: 16px 18px 14px;
            border: 1px solid #edf2f7;
            overflow-x: auto;
        }
        .table-section .table-title {
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 700px;
        }
        th {
            background: #f0f2f6;
            color: #4a5568;
            font-weight: 600;
            padding: 10px 12px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #edf2f7;
            color: #2d3748;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.good {
            background: #e6f7ef;
            color: #2f855a;
        }
        .badge.warn {
            background: #fef3c7;
            color: #b45309;
        }
        .badge.danger {
            background: #fee9ea;
            color: #e01a22;
        }
        .badge.ai-up {
            background: #e01a22;
            color: #fff;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .polaris-grid {
                grid-template-columns: 1fr 1fr;
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .dashboard {
                padding: 16px;
                border-radius: 20px;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .city-selector {
                align-self: flex-start;
                padding: 4px 12px;
            }
            .polaris-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .kpi-card .value {
                font-size: 28px;
            }
            .polaris-card .value {
                font-size: 36px;
            }
        }
        @media (max-width: 440px) {
            .polaris-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">

        <!-- ===== 顶栏 ===== -->
        <div class="top-bar">
            <div class="brand-area">
                <div class="brand-icon"><span>ad</span></div>
                <span class="brand-name">adidas <small>Retail AI</small></span>
            </div>
            <div class="top-right">
                <div class="city-selector" id="citySelector">
                    <label><input type="radio" name="city" value="上海" checked /> 上海</label>
                    <label><input type="radio" name="city" value="北京" /> 北京</label>
                    <label><input type="radio" name="city" value="广州" /> 广州</label>
                    <label><input type="radio" name="city" value="深圳" /> 深圳</label>
                </div>
                <span class="date-badge">📅 2026-07-09 · W28</span>
            </div>
        </div>

        <!-- ===== 北极星指标 KPI 卡片 ===== -->
        <div class="polaris-grid" id="polarisKpi">
            <!-- 由 JS 动态生成 -->
        </div>

        <!-- ===== 图表行 1 ===== -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">🏬 各门店补销率 <span class="sub">(固定 vs AI)</span></div>
                <div class="chart-container" id="chartStoreCoverage"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🌆 各城市补销率 <span class="sub">(固定 vs AI)</span></div>
                <div class="chart-container" id="chartCityCoverage"></div>
            </div>
        </div>

        <!-- ===== 图表行 2 ===== -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">🧥 各品类销售占比 <span class="sub">(AI策略)</span></div>
                <div class="chart-container" id="chartCategoryPie"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">👟 各品类补销率 <span class="sub">(固定 vs AI)</span></div>
                <div class="chart-container" id="chartCategoryCoverage"></div>
            </div>
        </div>

        <!-- ===== 门店明细表格 ===== -->
        <div class="table-section">
            <div class="table-title">📋 门店明细 · 补销率 & GMV</div>
            <table>
                <thead>
                    <tr>
                        <th>门店</th>
                        <th>补货量 (件)</th>
                        <th>销售额 (万元)</th>
                        <th>补销率 (固定)</th>
                        <th>补销率 (AI)</th>
                        <th>GMV 提升</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="storeTableBody">
                    <!-- JS 生成 -->
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // ================================================================
        //  1. 模拟数据生成器（按城市）
        // ================================================================
        const CITIES = ['上海', '北京', '广州', '深圳'];
        const STORE_NAMES = ['南京路', '三里屯', '天河城', '万象城', '春熙路', '湖滨银泰', '汉街', '解放碑'];
        const CATEGORIES = ['跑步鞋', '篮球鞋', '休闲鞋', '运动服饰', '配件'];

        // 生成较真实的补货、销售数据，补销率围绕1.0波动
        function generateCityData(city) {
            const seed = city.length * 7 + 3;
            // 门店数据
            const stores = STORE_NAMES.map((name, idx) => {
                const base = (idx * 5 + seed) % 13;
                // 固定策略：补销率多在0.75~1.05之间
                const fixedRestock = 200 + (base * 7) % 180;
                const fixedSales = fixedRestock * (0.78 + (base % 5) * 0.04);
                // AI策略：补销率更接近1.0，且波动更小
                const aiRestock = 190 + (base * 6) % 160;
                const aiSales = aiRestock * (0.92 + (base % 4) * 0.025);
                return {
                    name: `${city}${name}`,
                    fixed: {
                        restock: Math.round(fixedRestock),
                        sales: Math.round(fixedSales * 10) / 10,
                        coverage: Math.round((fixedSales / fixedRestock) * 100) / 100
                    },
                    ai: {
                        restock: Math.round(aiRestock),
                        sales: Math.round(aiSales * 10) / 10,
                        coverage: Math.round((aiSales / aiRestock) * 100) / 100
                    }
                };
            });

            // 汇总城市级数据（加权平均）
            const totalFixedRestock = stores.reduce((s, d) => s + d.fixed.restock, 0);
            const totalFixedSales = stores.reduce((s, d) => s + d.fixed.sales, 0);
            const totalAiRestock = stores.reduce((s, d) => s + d.ai.restock, 0);
            const totalAiSales = stores.reduce((s, d) => s + d.ai.sales, 0);

            const cityFixedCoverage = totalFixedSales / totalFixedRestock;
            const cityAiCoverage = totalAiSales / totalAiRestock;

            // 品类数据
            const products = CATEGORIES.map((cat, idx) => {
                const base = (idx * 11 + seed) % 9;
                const fixedRestock = 150 + (base * 8) % 140;
                const fixedSales = fixedRestock * (0.75 + (base % 6) * 0.05);
                const aiRestock = 140 + (base * 7) % 130;
                const aiSales = aiRestock * (0.90 + (base % 5) * 0.03);
                return {
                    category: cat,
                    fixed: {
                        restock: Math.round(fixedRestock),
                        sales: Math.round(fixedSales * 10) / 10,
                        coverage: Math.round((fixedSales / fixedRestock) * 100) / 100
                    },
                    ai: {
                        restock: Math.round(aiRestock),
                        sales: Math.round(aiSales * 10) / 10,
                        coverage: Math.round((aiSales / aiRestock) * 100) / 100
                    }
                };
            });

            return {
                city,
                stores,
                products,
                cityFixedCoverage,
                cityAiCoverage,
                totalFixedRestock,
                totalFixedSales,
                totalAiRestock,
                totalAiSales,
                gmvLift: ((totalAiSales - totalFixedSales) / totalFixedSales * 100)
            };
        }

        // 预生成所有城市数据
        const allData = {};
        CITIES.forEach(c => { allData[c] = generateCityData(c); });

        // ================================================================
        //  2. 全局状态
        // ================================================================
        let currentCity = '上海';

        // ================================================================
        //  3. DOM 引用 & 工具
        // ================================================================
        const cityRadios = document.querySelectorAll('input[name="city"]');
        const polarisDiv = document.getElementById('polarisKpi');
        const tableBody = document.getElementById('storeTableBody');

        // 辅助：补销率状态
        function coverageStatus(val) {
            if (val >= 0.9 && val <= 1.1) return { text: '健康', cls: 'good' };
            if (val >= 0.8 && val < 0.9) return { text: '偏低', cls: 'warn' };
            if (val > 1.1 && val <= 1.2) return { text: '偏高', cls: 'warn' };
            return { text: '异常', cls: 'danger' };
        }

        // ================================================================
        //  4. 渲染核心
        // ================================================================
        function renderDashboard() {
            const data = allData[currentCity];
            if (!data) return;

            // ---- 4a. 北极星 KPI ----
            const cityCoverageAI = data.cityAiCoverage;
            const cityCoverageFixed = data.cityFixedCoverage;
            const gmvFixed = data.totalFixedSales;
            const gmvAI = data.totalAiSales;
            const lift = data.gmvLift;
            // 计算补销率相对于理想范围的位置 (0.8~1.2)
            const minRange = 0.8,
                maxRange = 1.2;
            const clamped = Math.min(Math.max(cityCoverageAI, minRange), maxRange);
            const percent = ((clamped - minRange) / (maxRange - minRange)) * 100;

            polarisDiv.innerHTML = `
                <div class="kpi-card polaris-card">
                    <div class="label">🎯 北极星 · 补销率</div>
                    <div class="value">${cityCoverageAI.toFixed(2)}</div>
                    <div class="range-indicator">
                        <span style="font-size:12px;color:#718096;">0.8</span>
                        <div class="range-bar">
                            <div class="fill" style="width:${percent}%;"></div>
                        </div>
                        <span style="font-size:12px;color:#718096;">1.2</span>
                    </div>
                    <div class="range-labels">
                        <span>✅ 健康区间 0.8–1.2</span>
                        <span>固定策略: ${cityCoverageFixed.toFixed(2)}</span>
                    </div>
                    <div class="sub" style="margin-top:6px;">
                        ${cityCoverageAI >= 0.8 && cityCoverageAI <= 1.2 ? '✅ 补销率健康' : '⚠️ 需关注'}
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="label">💰 GMV (总销售额)</div>
                    <div class="value">¥${gmvAI.toFixed(0)}<span style="font-size:18px;font-weight:400;color:#a0aec0;margin-left:4px;">万</span></div>
                    <div class="sub">
                        AI 策略较固定策略 
                        <span class="${lift > 0 ? 'positive' : 'negative'}">
                            ${lift > 0 ? '↑' : '↓'} ${Math.abs(lift).toFixed(1)}%
                        </span>
                        (固定: ¥${gmvFixed.toFixed(0)}万)
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="label">📦 AI 补货总量</div>
                    <div class="value">${data.totalAiRestock.toLocaleString()}</div>
                    <div class="sub">较固定 ${((data.totalAiRestock - data.totalFixedRestock) / data.totalFixedRestock * 100).toFixed(1)}%</div>
                </div>
                <div class="kpi-card">
                    <div class="label">🏷️ 覆盖门店</div>
                    <div class="value">${data.stores.length}</div>
                    <div class="sub">AI 补销率均值 ${data.stores.reduce((s,d) => s + d.ai.coverage, 0) / data.stores.length}</div>
                </div>
            `;

            // ---- 4b. 图表 ----
            renderCharts(data);

            // ---- 4c. 表格 ----
            tableBody.innerHTML = data.stores.map(store => {
                const status = coverageStatus(store.ai.coverage);
                const liftStore = ((store.ai.sales - store.fixed.sales) / store.fixed.sales * 100);
                return `
                    <tr>
                        <td><strong>${store.name}</strong></td>
                        <td>${store.fixed.restock} → ${store.ai.restock}</td>
                        <td>${store.fixed.sales.toFixed(1)} → ${store.ai.sales.toFixed(1)}</td>
                        <td>${store.fixed.coverage.toFixed(2)}</td>
                        <td><strong>${store.ai.coverage.toFixed(2)}</strong></td>
                        <td class="${liftStore > 0 ? 'positive' : 'negative'}">${liftStore > 0 ? '+' : ''}${liftStore.toFixed(1)}%</td>
                        <td><span class="badge ${status.cls}">${status.text}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // ================================================================
        //  5. 图表渲染
        // ================================================================
        function renderCharts(data) {
            // 门店补销率柱状图 (分组)
            const storeChart = echarts.init(document.getElementById('chartStoreCoverage'));
            const storeNames = data.stores.map(d => d.name);
            const fixedCover = data.stores.map(d => d.fixed.coverage);
            const aiCover = data.stores.map(d => d.ai.coverage);

            storeChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        let html = `<strong>${params[0].axisValue}</strong><br/>`;
                        params.forEach(p => {
                            html += `${p.marker} ${p.seriesName}: ${p.value.toFixed(2)}<br/>`;
                        });
                        return html;
                    }
                },
                legend: { data: ['固定策略', 'AI策略'], bottom: 0, icon: 'roundRect', itemWidth: 14, itemHeight: 8 },
                grid: { left: '8%', right: '4%', top: '8%', bottom: '22%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: storeNames,
                    axisLabel: { rotate: 20, fontSize: 10, fontWeight: 500 }
                },
                yAxis: {
                    type: 'value',
                    min: 0.5,
                    max: 1.4,
                    splitLine: { lineStyle: { color: '#edf2f7', type: 'dashed' } },
                    axisLabel: { fontSize: 10 }
                },
                series: [{
                    name: '固定策略',
                    type: 'bar',
                    data: fixedCover,
                    itemStyle: { color: '#718096', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%',
                    barGap: '12%'
                }, {
                    name: 'AI策略',
                    type: 'bar',
                    data: aiCover,
                    itemStyle: { color: '#e01a22', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%'
                }]
            });
            storeChart.resize();

            // 城市补销率
            const cityChart = echarts.init(document.getElementById('chartCityCoverage'));
            const cityNames = CITIES;
            const cityFixed = cityNames.map(c => allData[c].cityFixedCoverage);
            const cityAi = cityNames.map(c => allData[c].cityAiCoverage);

            cityChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['固定策略', 'AI策略'], bottom: 0, icon: 'roundRect', itemWidth: 14, itemHeight: 8 },
                grid: { left: '8%', right: '4%', top: '8%', bottom: '22%', containLabel: true },
                xAxis: { type: 'category', data: cityNames, axisLabel: { fontWeight: 500 } },
                yAxis: { type: 'value', min: 0.5, max: 1.4, splitLine: { lineStyle: { color: '#edf2f7',
                            type: 'dashed' } } },
                series: [{
                    name: '固定策略',
                    type: 'bar',
                    data: cityFixed,
                    itemStyle: { color: '#718096', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%',
                    barGap: '12%'
                }, {
                    name: 'AI策略',
                    type: 'bar',
                    data: cityAi,
                    itemStyle: { color: '#e01a22', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%'
                }]
            });
            cityChart.resize();

            // 品类销售占比（饼图，基于AI策略）
            const pieChart = echarts.init(document.getElementById('chartCategoryPie'));
            const pieData = data.products.map(p => ({ name: p.category, value: p.ai.sales }));
            pieChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}万元 ({d}%)' },
                legend: { orient: 'vertical', left: 'left', bottom: 10, itemWidth: 12, itemHeight: 12 },
                series: [{
                    type: 'pie',
                    radius: ['45%', '70%'],
                    avoidLabelOverlap: true,
                    itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                    label: { show: true, formatter: '{b}\n{d}%', fontSize: 11 },
                    emphasis: { scale: true },
                    data: pieData,
                    color: ['#e01a22', '#f97316', '#fbbf24', '#34d399', '#60a5fa']
                }]
            });
            pieChart.resize();

            // 品类补销率
            const catChart = echarts.init(document.getElementById('chartCategoryCoverage'));
            const catNames = data.products.map(p => p.category);
            const catFixed = data.products.map(p => p.fixed.coverage);
            const catAi = data.products.map(p => p.ai.coverage);

            catChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['固定策略', 'AI策略'], bottom: 0, icon: 'roundRect', itemWidth: 14, itemHeight: 8 },
                grid: { left: '8%', right: '4%', top: '8%', bottom: '22%', containLabel: true },
                xAxis: { type: 'category', data: catNames, axisLabel: { fontWeight: 500 } },
                yAxis: { type: 'value', min: 0.5, max: 1.4, splitLine: { lineStyle: { color: '#edf2f7',
                            type: 'dashed' } } },
                series: [{
                    name: '固定策略',
                    type: 'bar',
                    data: catFixed,
                    itemStyle: { color: '#718096', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%',
                    barGap: '12%'
                }, {
                    name: 'AI策略',
                    type: 'bar',
                    data: catAi,
                    itemStyle: { color: '#e01a22', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%'
                }]
            });
            catChart.resize();

            // 存储图表实例用于resize
            window._charts = {
                storeChart,
                cityChart,
                pieChart,
                catChart
            };
        }

        // ================================================================
        //  6. 切换城市
        // ================================================================
        function switchCity(city) {
            if (currentCity === city) return;
            currentCity = city;
            renderDashboard();
            // 图表重新调整
            setTimeout(() => {
                Object.values(window._charts || {}).forEach(chart => { if (chart && chart.resize) chart.resize(); });
            }, 150);
        }

        cityRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.checked) switchCity(this.value);
            });
        });

        // ================================================================
        //  7. 自适应
        // ================================================================
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                Object.values(window._charts || {}).forEach(chart => {
                    if (chart && chart.resize) chart.resize();
                });
            }, 200);
        });

        // ================================================================
        //  8. 初始化
        // ================================================================
        renderDashboard();
        console.log('✅ 专业版 adidas 仪表板已加载');
    </script>

</body>
</html>
