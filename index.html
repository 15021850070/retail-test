<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adidas AI 补货系统 · 策略对比仪表板</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js">
    </script>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f6;
            color: #1a1a1a;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== 主容器 ===== */
        .dashboard {
            max-width: 1440px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 32px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            transition: all 0.2s;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px 24px;
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f2f6;
            margin-bottom: 28px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            letter-spacing: -0.5px;
            position: relative;
        }

        .brand-icon span {
            position: relative;
            z-index: 1;
        }

        .brand-icon::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            background: #e01a22;
            border-radius: 50%;
            opacity: 0.8;
        }

        .brand-name {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.3px;
            color: #1a1a1a;
        }

        .brand-name small {
            font-weight: 400;
            font-size: 14px;
            color: #718096;
            margin-left: 6px;
            letter-spacing: 0;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.2px;
        }

        .header-title .highlight {
            color: #e01a22;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14px;
            color: #718096;
        }

        .header-right .date {
            background: #f5f7fa;
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 500;
            color: #2d3748;
            font-size: 13px;
        }

        .badge-ai {
            background: #e01a22;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 100px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        /* ===== KPI 卡片行 ===== */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px 22px 22px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            border: 1px solid #edf2f7;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        .kpi-label {
            font-size: 13px;
            font-weight: 500;
            color: #718096;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .kpi-label .icon {
            font-size: 16px;
        }

        .kpi-values {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .kpi-value.fixed {
            color: #718096;
            font-weight: 500;
            font-size: 18px;
        }

        .kpi-value.ai {
            color: #e01a22;
        }

        .kpi-divider {
            color: #cbd5e0;
            font-weight: 300;
            font-size: 18px;
        }

        .kpi-diff {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 16px;
            font-weight: 700;
            padding: 2px 12px 2px 8px;
            border-radius: 100px;
            background: #edf2f7;
            margin-top: 2px;
        }

        .kpi-diff.positive {
            color: #e01a22;
            background: #fee9ea;
        }

        .kpi-diff.negative {
            color: #2f855a;
            background: #e6f7ef;
        }

        .kpi-diff .arrow {
            font-size: 14px;
        }

        .kpi-sub {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 6px;
            font-weight: 400;
        }

        .kpi-sub strong {
            color: #2d3748;
            font-weight: 600;
        }

        /* ===== 图表行 ===== */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: #fafbfc;
            border-radius: 20px;
            padding: 18px 16px 12px;
            border: 1px solid #edf2f7;
            transition: box-shadow 0.15s;
        }

        .chart-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
            letter-spacing: -0.2px;
        }

        .chart-title .sub {
            font-weight: 400;
            font-size: 13px;
            color: #a0aec0;
            margin-left: 6px;
        }

        .chart-container {
            width: 100%;
            height: 280px;
        }

        /* ===== 底部表格 ===== */
        .table-section {
            margin-top: 12px;
            background: #fafbfc;
            border-radius: 20px;
            padding: 18px 20px 14px;
            border: 1px solid #edf2f7;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 4px;
        }

        .table-header .title {
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
        }

        .table-header .title .sub {
            font-weight: 400;
            font-size: 13px;
            color: #a0aec0;
            margin-left: 6px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 700px;
        }

        thead th {
            background: #f0f2f6;
            color: #4a5568;
            font-weight: 600;
            padding: 10px 12px;
            text-align: left;
            white-space: nowrap;
            font-size: 12px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        thead th:first-child {
            border-radius: 10px 0 0 0;
        }
        thead th:last-child {
            border-radius: 0 10px 0 0;
        }

        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid #edf2f7;
            color: #2d3748;
            white-space: nowrap;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f7fafc;
        }

        .store-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .diff-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }

        .diff-badge.positive {
            background: #fee9ea;
            color: #e01a22;
        }

        .diff-badge.negative {
            background: #e6f7ef;
            color: #2f855a;
        }

        .diff-badge.neutral {
            background: #edf2f7;
            color: #718096;
        }

        .value-fixed {
            color: #718096;
        }

        .value-ai {
            color: #e01a22;
            font-weight: 600;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .dashboard {
                padding: 16px;
                border-radius: 20px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header-left {
                flex-wrap: wrap;
            }
            .header-title {
                font-size: 17px;
            }
            .kpi-row {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .kpi-card {
                padding: 14px 16px;
            }
            .kpi-value {
                font-size: 22px;
            }
            .kpi-value.fixed {
                font-size: 15px;
            }
            .kpi-diff {
                font-size: 13px;
                padding: 1px 10px 1px 6px;
            }
            .chart-container {
                height: 220px;
            }
            .dashboard {
                padding: 12px;
            }
            .table-section {
                padding: 12px 12px 8px;
            }
        }

        @media (max-width: 440px) {
            .kpi-row {
                grid-template-columns: 1fr;
            }
            .header-title {
                font-size: 15px;
            }
            .brand-name {
                font-size: 17px;
            }
        }

        /* ===== 工具类 ===== */
        .text-red {
            color: #e01a22;
        }
        .text-green {
            color: #2f855a;
        }
        .text-muted {
            color: #a0aec0;
        }
        .fw-600 {
            font-weight: 600;
        }

        /* 加载动画占位 */
        .chart-container {
            position: relative;
        }
        .chart-container canvas {
            border-radius: 8px;
        }

        /* 小标签装饰 */
        .tag-ai {
            display: inline-block;
            background: #e01a22;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 100px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-left: 4px;
            vertical-align: middle;
        }

        .tag-fixed {
            display: inline-block;
            background: #edf2f7;
            color: #4a5568;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 100px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-left: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="dashboard">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="header-left">
                <div class="brand">
                    <div class="brand-icon"><span>ad</span></div>
                    <span class="brand-name">adidas <small>Retail</small></span>
                </div>
                <div class="header-title">
                    AI 补货系统 · <span class="highlight">策略对比</span>
                    <span class="badge-ai" style="margin-left:10px;vertical-align:middle;">AI 驱动</span>
                </div>
            </div>
            <div class="header-right">
                <span class="date">📅 2026-07-09 · 周期 W28</span>
                <span style="display:flex;align-items:center;gap:6px;">
                    <span style="display:inline-block;width:10px;height:10px;background:#e01a22;border-radius:50%;"></span>
                    <span style="font-weight:500;color:#2d3748;">实时</span>
                </span>
            </div>
        </header>

        <!-- ===== KPI ROW ===== -->
        <div class="kpi-row" id="kpiRow">
            <!-- 由 JS 动态生成 -->
        </div>

        <!-- ===== CHARTS ROW 1 ===== -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">📊 门店补货量 <span class="sub">(件)</span></div>
                    <div style="font-size:12px;color:#a0aec0;">
                        <span style="display:inline-block;width:12px;height:12px;background:#718096;border-radius:3px;vertical-align:middle;margin-right:4px;"></span>固定
                        <span style="display:inline-block;width:12px;height:12px;background:#e01a22;border-radius:3px;vertical-align:middle;margin-left:12px;margin-right:4px;"></span>AI
                    </div>
                </div>
                <div class="chart-container" id="chartRestock"></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">📉 缺货率 <span class="sub">(%)</span></div>
                    <div style="font-size:12px;color:#a0aec0;">
                        <span style="display:inline-block;width:12px;height:12px;background:#718096;border-radius:3px;vertical-align:middle;margin-right:4px;"></span>固定
                        <span style="display:inline-block;width:12px;height:12px;background:#e01a22;border-radius:3px;vertical-align:middle;margin-left:12px;margin-right:4px;"></span>AI
                    </div>
                </div>
                <div class="chart-container" id="chartStockout"></div>
            </div>
        </div>

        <!-- ===== CHARTS ROW 2 ===== -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">🔄 周转天数 <span class="sub">(天)</span></div>
                    <div style="font-size:12px;color:#a0aec0;">
                        <span style="display:inline-block;width:12px;height:12px;background:#718096;border-radius:3px;vertical-align:middle;margin-right:4px;"></span>固定
                        <span style="display:inline-block;width:12px;height:12px;background:#e01a22;border-radius:3px;vertical-align:middle;margin-left:12px;margin-right:4px;"></span>AI
                    </div>
                </div>
                <div class="chart-container" id="chartTurnover"></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">💰 销售额 <span class="sub">(万元)</span></div>
                    <div style="font-size:12px;color:#a0aec0;">
                        <span style="display:inline-block;width:12px;height:12px;background:#718096;border-radius:3px;vertical-align:middle;margin-right:4px;"></span>固定
                        <span style="display:inline-block;width:12px;height:12px;background:#e01a22;border-radius:3px;vertical-align:middle;margin-left:12px;margin-right:4px;"></span>AI
                    </div>
                </div>
                <div class="chart-container" id="chartSales"></div>
            </div>
        </div>

        <!-- ===== TABLE SECTION ===== -->
        <div class="table-section">
            <div class="table-header">
                <div class="title">📋 门店明细差异 <span class="sub">— 固定策略 vs AI 策略</span></div>
                <div style="font-size:12px;color:#a0aec0;">
                    差异 = (AI - 固定) / 固定 × 100%
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>门店</th>
                            <th>补货量 (件)</th>
                            <th>差异</th>
                            <th>缺货率 (%)</th>
                            <th>差异</th>
                            <th>周转天数 (天)</th>
                            <th>差异</th>
                            <th>销售额 (万元)</th>
                            <th>差异</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 由 JS 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        //  1. 模拟数据
        // ================================================================
        const storeData = [{
            name: '上海南京路',
            fixed: { restock: 280, stockout: 8.5, turnover: 45, sales: 128 },
            ai: { restock: 245, stockout: 3.2, turnover: 28, sales: 152 }
        }, {
            name: '北京三里屯',
            fixed: { restock: 320, stockout: 6.8, turnover: 38, sales: 156 },
            ai: { restock: 290, stockout: 2.5, turnover: 24, sales: 178 }
        }, {
            name: '广州天河城',
            fixed: { restock: 220, stockout: 10.2, turnover: 52, sales: 98 },
            ai: { restock: 200, stockout: 4.8, turnover: 32, sales: 118 }
        }, {
            name: '深圳万象城',
            fixed: { restock: 260, stockout: 7.5, turnover: 42, sales: 135 },
            ai: { restock: 235, stockout: 2.8, turnover: 26, sales: 158 }
        }, {
            name: '成都春熙路',
            fixed: { restock: 190, stockout: 12.3, turnover: 58, sales: 82 },
            ai: { restock: 175, stockout: 5.5, turnover: 35, sales: 102 }
        }, {
            name: '杭州湖滨银泰',
            fixed: { restock: 210, stockout: 9.6, turnover: 48, sales: 105 },
            ai: { restock: 192, stockout: 4.2, turnover: 30, sales: 125 }
        }, {
            name: '武汉汉街',
            fixed: { restock: 175, stockout: 11.8, turnover: 55, sales: 78 },
            ai: { restock: 162, stockout: 5.0, turnover: 33, sales: 95 }
        }, {
            name: '重庆解放碑',
            fixed: { restock: 195, stockout: 10.5, turnover: 50, sales: 92 },
            ai: { restock: 178, stockout: 4.5, turnover: 31, sales: 112 }
        }];

        // 计算汇总
        function calcTotal(arr, key, sub) {
            return arr.reduce((sum, d) => sum + d[key][sub], 0);
        }

        function calcAvg(arr, key, sub) {
            return arr.reduce((sum, d) => sum + d[key][sub], 0) / arr.length;
        }

        const totalRestockFixed = calcTotal(storeData, 'fixed', 'restock');
        const totalRestockAI = calcTotal(storeData, 'ai', 'restock');
        const avgStockoutFixed = calcAvg(storeData, 'fixed', 'stockout');
        const avgStockoutAI = calcAvg(storeData, 'ai', 'stockout');
        const avgTurnoverFixed = calcAvg(storeData, 'fixed', 'turnover');
        const avgTurnoverAI = calcAvg(storeData, 'ai', 'turnover');
        const totalSalesFixed = calcTotal(storeData, 'fixed', 'sales');
        const totalSalesAI = calcTotal(storeData, 'ai', 'sales');

        function pct(a, b) { return ((b - a) / a * 100); }

        const diffRestock = pct(totalRestockFixed, totalRestockAI);
        const diffStockout = pct(avgStockoutFixed, avgStockoutAI);
        const diffTurnover = pct(avgTurnoverFixed, avgTurnoverAI);
        const diffSales = pct(totalSalesFixed, totalSalesAI);

        // ================================================================
        //  2. 渲染 KPI
        // ================================================================
        const kpiData = [{
            label: '总补货量',
            icon: '📦',
            fixed: totalRestockFixed,
            ai: totalRestockAI,
            diff: diffRestock,
            fixedLabel: '件',
            aiLabel: '件',
            format: v => Math.round(v).toLocaleString()
        }, {
            label: '平均缺货率',
            icon: '📉',
            fixed: avgStockoutFixed,
            ai: avgStockoutAI,
            diff: diffStockout,
            fixedLabel: '%',
            aiLabel: '%',
            format: v => v.toFixed(1)
        }, {
            label: '平均周转天数',
            icon: '🔄',
            fixed: avgTurnoverFixed,
            ai: avgTurnoverAI,
            diff: diffTurnover,
            fixedLabel: '天',
            aiLabel: '天',
            format: v => Math.round(v)
        }, {
            label: '总销售额',
            icon: '💰',
            fixed: totalSalesFixed,
            ai: totalSalesAI,
            diff: diffSales,
            fixedLabel: '万',
            aiLabel: '万',
            format: v => Math.round(v).toLocaleString()
        }];

        const kpiRow = document.getElementById('kpiRow');
        kpiRow.innerHTML = kpiData.map(k => {
            const isPositive = k.diff > 0;
            const isGood = (k.label === '平均缺货率' || k.label === '平均周转天数') ? !isPositive : isPositive;
            // 对于缺货率和周转天数，降低是好事
            const showPositive = (k.label === '平均缺货率' || k.label === '平均周转天数') ? !isPositive : isPositive;
            const diffClass = showPositive ? 'positive' : 'negative';
            const arrow = showPositive ? '▲' : '▼';
            const diffAbs = Math.abs(k.diff).toFixed(1);
            return `
                <div class="kpi-card">
                    <div class="kpi-label"><span class="icon">${k.icon}</span> ${k.label}</div>
                    <div class="kpi-values">
                        <span class="kpi-value fixed">${k.format(k.fixed)}<span style="font-size:11px;font-weight:400;color:#a0aec0;margin-left:2px;">${k.fixedLabel}</span></span>
                        <span class="kpi-divider">→</span>
                        <span class="kpi-value ai">${k.format(k.ai)}<span style="font-size:11px;font-weight:400;color:#a0aec0;margin-left:2px;">${k.aiLabel}</span></span>
                        <span class="kpi-diff ${diffClass}">
                            <span class="arrow">${arrow}</span> ${diffAbs}%
                        </span>
                    </div>
                    <div class="kpi-sub">
                        <strong>${k.format(k.fixed)}</strong> → <strong>${k.format(k.ai)}</strong>
                        ${k.label === '平均缺货率' || k.label === '平均周转天数' ? '（降低为优）' : '（提升为优）'}
                    </div>
                </div>
            `;
        }).join('');

        // ================================================================
        //  3. 渲染表格
        // ================================================================
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = storeData.map(d => {
            const diffR = ((d.ai.restock - d.fixed.restock) / d.fixed.restock * 100);
            const diffS = ((d.ai.stockout - d.fixed.stockout) / d.fixed.stockout * 100);
            const diffT = ((d.ai.turnover - d.fixed.turnover) / d.fixed.turnover * 100);
            const diffSales = ((d.ai.sales - d.fixed.sales) / d.fixed.sales * 100);

            function badge(v, invert = false) {
                const isPos = invert ? v < 0 : v > 0;
                const cls = Math.abs(v) < 0.5 ? 'neutral' : (isPos ? 'positive' : 'negative');
                const sign = v > 0 ? '+' : '';
                return `<span class="diff-badge ${cls}">${sign}${v.toFixed(1)}%</span>`;
            }

            // 缺货率、周转天数：降低为优（所以 invert=true）
            return `
                <tr>
                    <td class="store-name">${d.name}</td>
                    <td><span class="value-fixed">${d.fixed.restock}</span> → <span class="value-ai">${d.ai.restock}</span></td>
                    <td>${badge(diffR)}</td>
                    <td><span class="value-fixed">${d.fixed.stockout.toFixed(1)}</span> → <span class="value-ai">${d.ai.stockout.toFixed(1)}</span></td>
                    <td>${badge(diffS, true)}</td>
                    <td><span class="value-fixed">${d.fixed.turnover}</span> → <span class="value-ai">${d.ai.turnover}</span></td>
                    <td>${badge(diffT, true)}</td>
                    <td><span class="value-fixed">${d.fixed.sales}</span> → <span class="value-ai">${d.ai.sales}</span></td>
                    <td>${badge(diffSales)}</td>
                </tr>
            `;
        }).join('');

        // ================================================================
        //  4. ECharts 图表
        // ================================================================
        function initChart(domId, xData, seriesData, opts = {}) {
            const dom = document.getElementById(domId);
            if (!dom) return null;
            const chart = echarts.init(dom);
            const defaultOpts = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        let html = `<strong>${params[0].axisValue}</strong><br/>`;
                        params.forEach(p => {
                            const val = p.seriesName === '固定策略' ? p.value : p.value;
                            html += `${p.marker} ${p.seriesName}: <strong>${p.value}</strong><br/>`;
                        });
                        // 计算差异
                        const fixed = params.find(p => p.seriesName === '固定策略');
                        const ai = params.find(p => p.seriesName === 'AI策略');
                        if (fixed && ai) {
                            const diff = ((ai.value - fixed.value) / fixed.value * 100);
                            const sign = diff > 0 ? '+' : '';
                            const color = diff > 0 ? '#e01a22' : '#2f855a';
                            html += `<div style="margin-top:4px;border-top:1px solid #edf2f7;padding-top:4px;">差异: <span style="color:${color};font-weight:700;">${sign}${diff.toFixed(1)}%</span></div>`;
                        }
                        return html;
                    }
                },
                legend: {
                    data: ['固定策略', 'AI策略'],
                    bottom: 0,
                    left: 'center',
                    icon: 'roundRect',
                    itemWidth: 14,
                    itemHeight: 8,
                    textStyle: { fontSize: 12, color: '#4a5568' }
                },
                grid: {
                    left: '6%',
                    right: '6%',
                    top: '10%',
                    bottom: '22%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: xData,
                    axisLine: { lineStyle: { color: '#e2e8f0' } },
                    axisLabel: { color: '#4a5568', fontSize: 11, fontWeight: 500 },
                    axisTick: { show: false }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: '#edf2f7', type: 'dashed' } },
                    axisLabel: { color: '#718096', fontSize: 11 },
                    name: opts.yName || '',
                    nameTextStyle: { color: '#a0aec0', fontSize: 11 }
                },
                series: [{
                    name: '固定策略',
                    type: 'bar',
                    data: seriesData.fixed,
                    itemStyle: {
                        color: '#718096',
                        borderRadius: [4, 4, 0, 0]
                    },
                    barWidth: '28%',
                    barGap: '12%'
                }, {
                    name: 'AI策略',
                    type: 'bar',
                    data: seriesData.ai,
                    itemStyle: {
                        color: '#e01a22',
                        borderRadius: [4, 4, 0, 0]
                    },
                    barWidth: '28%',
                    label: {
                        show: true,
                        position: 'top',
                        color: '#e01a22',
                        fontSize: 10,
                        fontWeight: 600,
                        formatter: function(p) {
                            const idx = p.dataIndex;
                            const fixed = seriesData.fixed[idx];
                            const ai = seriesData.ai[idx];
                            const diff = ((ai - fixed) / fixed * 100);
                            const sign = diff > 0 ? '+' : '';
                            return `${sign}${diff.toFixed(1)}%`;
                        }
                    }
                }],
                ...opts
            };
            chart.setOption(defaultOpts);
            window.addEventListener('resize', () => chart.resize());
            return chart;
        }

        // 准备数据
        const storeNames = storeData.map(d => d.name);
        const fixedRestock = storeData.map(d => d.fixed.restock);
        const aiRestock = storeData.map(d => d.ai.restock);
        const fixedStockout = storeData.map(d => d.fixed.stockout);
        const aiStockout = storeData.map(d => d.ai.stockout);
        const fixedTurnover = storeData.map(d => d.fixed.turnover);
        const aiTurnover = storeData.map(d => d.ai.turnover);
        const fixedSales = storeData.map(d => d.fixed.sales);
        const aiSales = storeData.map(d => d.ai.sales);

        // 补货量
        initChart('chartRestock', storeNames, { fixed: fixedRestock, ai: aiRestock }, { yName: '件' });

        // 缺货率
        initChart('chartStockout', storeNames, { fixed: fixedStockout, ai: aiStockout }, { yName: '%' });

        // 周转天数
        initChart('chartTurnover', storeNames, { fixed: fixedTurnover, ai: aiTurnover }, { yName: '天' });

        // 销售额
        initChart('chartSales', storeNames, { fixed: fixedSales, ai: aiSales }, { yName: '万元' });

        // ================================================================
        //  5. 自适应
        // ================================================================
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                document.querySelectorAll('.chart-container canvas').forEach(c => {
                    const inst = echarts.getInstanceByDom(c.parentNode);
                    if (inst) inst.resize();
                });
            }, 200);
        });

        console.log('✅ adidas AI 补货 Dashboard 已加载');
        console.log('📊 数据汇总:', {
            totalRestock: { fixed: totalRestockFixed, ai: totalRestockAI, diff: diffRestock.toFixed(1) + '%' },
            avgStockout: { fixed: avgStockoutFixed.toFixed(1), ai: avgStockoutAI.toFixed(1), diff: diffStockout.toFixed(
                    1) + '%' },
            avgTurnover: { fixed: Math.round(avgTurnoverFixed), ai: Math.round(avgTurnoverAI), diff: diffTurnover.toFixed(
                    1) + '%' },
            totalSales: { fixed: totalSalesFixed, ai: totalSalesAI, diff: diffSales.toFixed(1) + '%' }
        });
    </script>

</body>
</html>
