<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adidas AI 补货 · 多维度仪表板</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js">
    </script>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f6;
            color: #1a1a1a;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .dashboard {
            max-width: 1440px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 24px 28px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }

        /* ===== 顶栏：品牌 + 面包屑 + 城市选择 ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f2f6;
            margin-bottom: 20px;
        }

        .brand-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            letter-spacing: -0.5px;
            position: relative;
        }
        .brand-icon span {
            position: relative;
            z-index: 1;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            background: #e01a22;
            border-radius: 50%;
            opacity: 0.8;
        }
        .brand-name {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.3px;
        }
        .brand-name small {
            font-weight: 400;
            font-size: 14px;
            color: #718096;
            margin-left: 6px;
        }

        /* 面包屑 */
        .breadcrumb {
            font-size: 14px;
            color: #718096;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: #2d3748;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.15s;
        }
        .breadcrumb a:hover {
            color: #e01a22;
        }
        .breadcrumb .sep {
            color: #cbd5e0;
        }
        .breadcrumb .current {
            color: #1a1a1a;
            font-weight: 600;
        }

        /* 城市单选框 */
        .city-selector {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f5f7fa;
            padding: 6px 16px 6px 18px;
            border-radius: 100px;
            border: 1px solid #edf2f7;
        }
        .city-selector label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
        }
        .city-selector input[type="radio"] {
            accent-color: #e01a22;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        /* ===== 导航标签 ===== */
        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 2px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            background: transparent;
            letter-spacing: 0.2px;
        }
        .nav-tab:hover {
            color: #2d3748;
            background: #f7fafc;
        }
        .nav-tab.active {
            color: #e01a22;
            background: #fee9ea;
            position: relative;
        }
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #e01a22;
            border-radius: 3px 3px 0 0;
        }

        /* ===== 页面容器 ===== */
        .page {
            display: none;
            animation: fadeUp 0.25s ease;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 复用组件 ===== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 18px 20px 20px;
            border: 1px solid #edf2f7;
            transition: 0.1s;
        }
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }
        .kpi-label {
            font-size: 13px;
            font-weight: 500;
            color: #718096;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .kpi-number {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        .kpi-sub {
            font-size: 13px;
            color: #a0aec0;
            margin-top: 4px;
        }
        .kpi-sub .highlight {
            color: #e01a22;
            font-weight: 600;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 16px;
        }
        .chart-card {
            background: #fafbfc;
            border-radius: 20px;
            padding: 16px 14px 10px;
            border: 1px solid #edf2f7;
        }
        .chart-card .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
            padding-left: 4px;
        }
        .chart-container {
            width: 100%;
            height: 260px;
        }

        .table-wrap {
            margin-top: 20px;
            background: #fafbfc;
            border-radius: 20px;
            padding: 16px 18px 14px;
            border: 1px solid #edf2f7;
            overflow-x: auto;
        }
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 600px;
        }
        .table-wrap th {
            background: #f0f2f6;
            color: #4a5568;
            font-weight: 600;
            padding: 10px 12px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        .table-wrap td {
            padding: 10px 12px;
            border-bottom: 1px solid #edf2f7;
            color: #2d3748;
        }
        .table-wrap tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.positive {
            background: #fee9ea;
            color: #e01a22;
        }
        .badge.negative {
            background: #e6f7ef;
            color: #2f855a;
        }
        .badge.neutral {
            background: #edf2f7;
            color: #718096;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .dashboard {
                padding: 16px;
                border-radius: 20px;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .city-selector {
                align-self: flex-start;
                padding: 6px 14px;
            }
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .kpi-number {
                font-size: 24px;
            }
            .nav-tab {
                padding: 8px 14px;
                font-size: 13px;
            }
        }
        @media (max-width: 440px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">

        <!-- ===== 顶栏 ===== -->
        <div class="top-bar">
            <div class="brand-area">
                <div class="brand-icon"><span>ad</span></div>
                <span class="brand-name">adidas <small>Retail</small></span>
            </div>
            <div class="breadcrumb" id="breadcrumb">
                <a href="#" data-page="overview">首页</a>
                <span class="sep">/</span>
                <span class="current" id="breadcrumbCurrent">总览</span>
            </div>
            <div class="city-selector" id="citySelector">
                <label><input type="radio" name="city" value="上海" checked /> 上海</label>
                <label><input type="radio" name="city" value="北京" /> 北京</label>
                <label><input type="radio" name="city" value="广州" /> 广州</label>
                <label><input type="radio" name="city" value="深圳" /> 深圳</label>
            </div>
        </div>

        <!-- ===== 导航标签 ===== -->
        <div class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-page="overview">📊 总览</button>
            <button class="nav-tab" data-page="stores">🏬 门店分析</button>
            <button class="nav-tab" data-page="products">👟 商品分析</button>
            <button class="nav-tab" data-page="optimize">⚡ 补货优化</button>
        </div>

        <!-- ========================================================= -->
        <!-- 页面1: 总览 -->
        <!-- ========================================================= -->
        <div class="page active" id="page-overview">
            <div class="kpi-grid" id="overviewKpi">
                <!-- JS 动态生成 -->
            </div>
            <div class="chart-grid">
                <div class="chart-card">
                    <div class="chart-title">📈 补货量趋势 (近6周)</div>
                    <div class="chart-container" id="overviewTrend"></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">📊 各品类销售额占比</div>
                    <div class="chart-container" id="overviewPie"></div>
                </div>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- 页面2: 门店分析 -->
        <!-- ========================================================= -->
        <div class="page" id="page-stores">
            <div class="kpi-grid" id="storeKpi">
                <!-- JS 动态生成 -->
            </div>
            <div class="chart-grid">
                <div class="chart-card">
                    <div class="chart-title">🏷️ 门店补货量对比</div>
                    <div class="chart-container" id="storeBar"></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">📉 门店缺货率对比</div>
                    <div class="chart-container" id="storeStockout"></div>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>门店</th><th>补货量</th><th>缺货率</th><th>周转天数</th><th>销售额</th></tr></thead>
                    <tbody id="storeTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- 页面3: 商品分析 -->
        <!-- ========================================================= -->
        <div class="page" id="page-products">
            <div class="kpi-grid" id="productKpi">
                <!-- JS 动态生成 -->
            </div>
            <div class="chart-grid">
                <div class="chart-card">
                    <div class="chart-title">👟 各品类补货量</div>
                    <div class="chart-container" id="productBar"></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">📦 库存周转率 (品类)</div>
                    <div class="chart-container" id="productTurnover"></div>
                </div>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- 页面4: 补货优化 -->
        <!-- ========================================================= -->
        <div class="page" id="page-optimize">
            <div class="kpi-grid" id="optimizeKpi">
                <!-- JS 动态生成 -->
            </div>
            <div class="chart-grid">
                <div class="chart-card">
                    <div class="chart-title">⚡ 补货建议 vs 实际需求</div>
                    <div class="chart-container" id="optimizeBar"></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">📋 优化收益预估</div>
                    <div class="chart-container" id="optimizeGain"></div>
                </div>
            </div>
            <div style="margin-top:20px;background:#f8fafc;border-radius:20px;padding:18px 22px;border:1px solid #edf2f7;">
                <p style="font-weight:600;color:#2d3748;margin-bottom:6px;">💡 AI 补货建议摘要</p>
                <p id="optimizeSummary" style="color:#4a5568;font-size:14px;line-height:1.6;">加载中...</p>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        //  1. 模拟数据生成器（按城市）
        // ================================================================
        const CITIES = ['上海', '北京', '广州', '深圳'];
        const STORE_NAMES = ['南京路', '三里屯', '天河城', '万象城', '春熙路', '湖滨银泰', '汉街', '解放碑'];
        const CATEGORIES = ['跑步鞋', '篮球鞋', '休闲鞋', '运动服饰', '配件'];

        function random(min, max) { return Math.round((Math.random() * (max - min) + min) * 10) / 10; }

        function generateCityData(city) {
            const seed = city.length; // 简单种子使数据稳定
            const base = (seed * 13 + 7) % 10;

            // 生成门店数据
            const stores = STORE_NAMES.map((name, idx) => {
                const offset = (idx * 3 + seed) % 7;
                return {
                    name: `${city}${name}`,
                    restock: 180 + random(0, 220) + offset * 6,
                    stockout: 3.5 + random(0, 8) + offset * 0.2,
                    turnover: 25 + random(0, 35) + offset * 1.2,
                    sales: 80 + random(0, 120) + offset * 4,
                };
            });

            // 商品品类数据
            const products = CATEGORIES.map((cat, idx) => {
                const offset = (idx * 5 + seed) % 6;
                return {
                    category: cat,
                    restock: 120 + random(0, 180) + offset * 10,
                    turnover: 20 + random(0, 30) + offset * 1.5,
                    sales: 50 + random(0, 90) + offset * 3,
                };
            });

            // 近6周趋势
            const weeks = ['W23', 'W24', 'W25', 'W26', 'W27', 'W28'];
            const trend = weeks.map((w, i) => ({
                week: w,
                fixed: 220 + random(0, 80) + (i * 3 + seed) % 12,
                ai: 210 + random(0, 80) + (i * 4 + seed) % 14,
            }));

            // 补货优化建议（按门店）
            const optimize = stores.map(s => ({
                store: s.name,
                currentRestock: s.restock,
                suggestedRestock: Math.round(s.restock * (0.85 + random(0, 0.2))),
                demandGap: random(-15, 25),
            }));

            return {
                city,
                stores,
                products,
                trend,
                optimize,
                // 汇总
                totalRestock: stores.reduce((sum, s) => sum + s.restock, 0),
                avgStockout: stores.reduce((sum, s) => sum + s.stockout, 0) / stores.length,
                avgTurnover: stores.reduce((sum, s) => sum + s.turnover, 0) / stores.length,
                totalSales: stores.reduce((sum, s) => sum + s.sales, 0),
            };
        }

        // 预生成所有城市数据
        const allData = {};
        CITIES.forEach(c => { allData[c] = generateCityData(c); });

        // ================================================================
        //  2. 全局状态
        // ================================================================
        let currentCity = '上海';
        let currentPage = 'overview';

        // ================================================================
        //  3. DOM 引用
        // ================================================================
        const pages = {
            overview: document.getElementById('page-overview'),
            stores: document.getElementById('page-stores'),
            products: document.getElementById('page-products'),
            optimize: document.getElementById('page-optimize'),
        };
        const tabs = document.querySelectorAll('.nav-tab');
        const breadcrumbCurrent = document.getElementById('breadcrumbCurrent');
        const cityRadios = document.querySelectorAll('input[name="city"]');

        // ================================================================
        //  4. 渲染函数
        // ================================================================
        function renderAll() {
            const data = allData[currentCity];
            if (!data) return;

            // 更新面包屑
            const pageNames = {
                overview: '总览',
                stores: '门店分析',
                products: '商品分析',
                optimize: '补货优化'
            };
            breadcrumbCurrent.textContent = pageNames[currentPage] || '总览';

            // 根据当前页面渲染
            if (currentPage === 'overview') renderOverview(data);
            else if (currentPage === 'stores') renderStores(data);
            else if (currentPage === 'products') renderProducts(data);
            else if (currentPage === 'optimize') renderOptimize(data);
        }

        // ---------- 总览 ----------
        function renderOverview(data) {
            const kpi = [
                { label: '总补货量 (件)', value: data.totalRestock, sub: '较上周 +6%' },
                { label: '平均缺货率', value: data.avgStockout.toFixed(1) + '%', sub: '较上周 -1.2%' },
                { label: '平均周转天数', value: Math.round(data.avgTurnover) + '天', sub: '较上周 -3天' },
                { label: '总销售额 (万元)', value: data.totalSales.toFixed(0), sub: '较上周 +8%' },
            ];
            document.getElementById('overviewKpi').innerHTML = kpi.map(k =>
                `<div class="kpi-card">
                    <div class="kpi-label">${k.label}</div>
                    <div class="kpi-number">${k.value}</div>
                    <div class="kpi-sub">${k.sub}</div>
                </div>`
            ).join('');

            // 趋势图
            const trendChart = echarts.init(document.getElementById('overviewTrend'));
            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['固定策略', 'AI策略'], bottom: 0, icon: 'roundRect', itemWidth: 14, itemHeight: 8 },
                grid: { left: '6%', right: '4%', top: '8%', bottom: '22%', containLabel: true },
                xAxis: { type: 'category', data: data.trend.map(d => d.week), axisLine: { lineStyle: { color: '#e2e8f0' } } },
                yAxis: { type: 'value', splitLine: { lineStyle: { color: '#edf2f7', type: 'dashed' } } },
                series: [{
                    name: '固定策略',
                    type: 'line',
                    data: data.trend.map(d => d.fixed),
                    smooth: true,
                    lineStyle: { color: '#718096', width: 2 },
                    itemStyle: { color: '#718096' },
                    symbol: 'circle',
                    symbolSize: 6
                }, {
                    name: 'AI策略',
                    type: 'line',
                    data: data.trend.map(d => d.ai),
                    smooth: true,
                    lineStyle: { color: '#e01a22', width: 2 },
                    itemStyle: { color: '#e01a22' },
                    symbol: 'circle',
                    symbolSize: 6
                }]
            });
            trendChart.resize();

            // 饼图：品类销售额占比
            const pieChart = echarts.init(document.getElementById('overviewPie'));
            const pieData = data.products.map(p => ({ name: p.category, value: p.sales }));
            pieChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}万元 ({d}%)' },
                legend: { orient: 'vertical', left: 'left', bottom: 10, itemWidth: 12, itemHeight: 12 },
                series: [{
                    type: 'pie',
                    radius: ['45%', '70%'],
                    avoidLabelOverlap: true,
                    itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                    label: { show: false },
                    emphasis: { scale: true },
                    data: pieData,
                    color: ['#e01a22', '#f97316', '#fbbf24', '#34d399', '#60a5fa']
                }]
            });
            pieChart.resize();

            // 存储图表实例以便resize
            window._charts = window._charts || {};
            window._charts.overviewTrend = trendChart;
            window._charts.overviewPie = pieChart;
        }

        // ---------- 门店分析 ----------
        function renderStores(data) {
            const stores = data.stores;
            const total = stores.reduce((s, d) => s + d.restock, 0);
            const avgStock = stores.reduce((s, d) => s + d.stockout, 0) / stores.length;
            const avgTurn = stores.reduce((s, d) => s + d.turnover, 0) / stores.length;
            const totalSales = stores.reduce((s, d) => s + d.sales, 0);

            document.getElementById('storeKpi').innerHTML = `
                <div class="kpi-card"><div class="kpi-label">门店数</div><div class="kpi-number">${stores.length}</div></div>
                <div class="kpi-card"><div class="kpi-label">总补货量</div><div class="kpi-number">${total}</div></div>
                <div class="kpi-card"><div class="kpi-label">平均缺货率</div><div class="kpi-number">${avgStock.toFixed(1)}%</div></div>
                <div class="kpi-card"><div class="kpi-label">总销售额</div><div class="kpi-number">${totalSales.toFixed(0)}万</div></div>
            `;

            // 条形图：补货量
            const barChart = echarts.init(document.getElementById('storeBar'));
            barChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '8%', right: '4%', top: '6%', bottom: '16%', containLabel: true },
                xAxis: { type: 'category', data: stores.map(s => s.name), axisLabel: { rotate: 20, fontSize: 10 } },
                yAxis: { type: 'value', name: '件' },
                series: [{
                    type: 'bar',
                    data: stores.map(s => s.restock),
                    itemStyle: { color: '#e01a22', borderRadius: [4, 4, 0, 0] },
                    barWidth: '40%'
                }]
            });
            barChart.resize();

            // 缺货率柱状图
            const stockChart = echarts.init(document.getElementById('storeStockout'));
            stockChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '8%', right: '4%', top: '6%', bottom: '16%', containLabel: true },
                xAxis: { type: 'category', data: stores.map(s => s.name), axisLabel: { rotate: 20, fontSize: 10 } },
                yAxis: { type: 'value', name: '%' },
                series: [{
                    type: 'bar',
                    data: stores.map(s => s.stockout),
                    itemStyle: { color: '#f97316', borderRadius: [4, 4, 0, 0] },
                    barWidth: '40%'
                }]
            });
            stockChart.resize();

            // 表格
            const tbody = document.getElementById('storeTableBody');
            tbody.innerHTML = stores.map(s => `
                <tr>
                    <td><strong>${s.name}</strong></td>
                    <td>${s.restock}</td>
                    <td>${s.stockout.toFixed(1)}%</td>
                    <td>${s.turnover}</td>
                    <td>${s.sales.toFixed(0)}万</td>
                </tr>
            `).join('');

            window._charts.storeBar = barChart;
            window._charts.storeStockout = stockChart;
        }

        // ---------- 商品分析 ----------
        function renderProducts(data) {
            const prods = data.products;
            const totalRestock = prods.reduce((s, p) => s + p.restock, 0);
            const avgTurn = prods.reduce((s, p) => s + p.turnover, 0) / prods.length;
            const totalSales = prods.reduce((s, p) => s + p.sales, 0);

            document.getElementById('productKpi').innerHTML = `
                <div class="kpi-card"><div class="kpi-label">品类数</div><div class="kpi-number">${prods.length}</div></div>
                <div class="kpi-card"><div class="kpi-label">总补货量</div><div class="kpi-number">${totalRestock}</div></div>
                <div class="kpi-card"><div class="kpi-label">平均周转</div><div class="kpi-number">${avgTurn.toFixed(1)}天</div></div>
                <div class="kpi-card"><div class="kpi-label">总销售额</div><div class="kpi-number">${totalSales.toFixed(0)}万</div></div>
            `;

            // 品类补货量柱状图
            const bar = echarts.init(document.getElementById('productBar'));
            bar.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '8%', right: '4%', top: '6%', bottom: '16%', containLabel: true },
                xAxis: { type: 'category', data: prods.map(p => p.category) },
                yAxis: { type: 'value', name: '件' },
                series: [{
                    type: 'bar',
                    data: prods.map(p => p.restock),
                    itemStyle: { color: '#3b82f6', borderRadius: [4, 4, 0, 0] },
                    barWidth: '35%'
                }]
            });
            bar.resize();

            // 周转率条形图
            const turn = echarts.init(document.getElementById('productTurnover'));
            turn.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '8%', right: '4%', top: '6%', bottom: '16%', containLabel: true },
                xAxis: { type: 'category', data: prods.map(p => p.category) },
                yAxis: { type: 'value', name: '天' },
                series: [{
                    type: 'bar',
                    data: prods.map(p => p.turnover),
                    itemStyle: { color: '#8b5cf6', borderRadius: [4, 4, 0, 0] },
                    barWidth: '35%'
                }]
            });
            turn.resize();

            window._charts.productBar = bar;
            window._charts.productTurnover = turn;
        }

        // ---------- 补货优化 ----------
        function renderOptimize(data) {
            const opt = data.optimize;
            const totalCurrent = opt.reduce((s, o) => s + o.currentRestock, 0);
            const totalSuggested = opt.reduce((s, o) => s + o.suggestedRestock, 0);
            const totalGap = opt.reduce((s, o) => s + o.demandGap, 0);

            document.getElementById('optimizeKpi').innerHTML = `
                <div class="kpi-card"><div class="kpi-label">当前补货总量</div><div class="kpi-number">${totalCurrent}</div></div>
                <div class="kpi-card"><div class="kpi-label">建议补货总量</div><div class="kpi-number">${totalSuggested}</div></div>
                <div class="kpi-card"><div class="kpi-label">需求缺口</div><div class="kpi-number" style="color:${totalGap>0?'#e01a22':'#2f855a'}">${totalGap>0?'+':''}${totalGap}</div></div>
                <div class="kpi-card"><div class="kpi-label">优化门店数</div><div class="kpi-number">${opt.filter(o=>Math.abs(o.demandGap)>3).length}</div></div>
            `;

            // 建议 vs 实际
            const bar = echarts.init(document.getElementById('optimizeBar'));
            bar.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['当前补货', '建议补货'], bottom: 0, icon: 'roundRect', itemWidth: 14, itemHeight: 8 },
                grid: { left: '8%', right: '4%', top: '6%', bottom: '22%', containLabel: true },
                xAxis: { type: 'category', data: opt.map(o => o.store), axisLabel: { rotate: 20, fontSize: 10 } },
                yAxis: { type: 'value', name: '件' },
                series: [{
                    name: '当前补货',
                    type: 'bar',
                    data: opt.map(o => o.currentRestock),
                    itemStyle: { color: '#718096', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%',
                    barGap: '10%'
                }, {
                    name: '建议补货',
                    type: 'bar',
                    data: opt.map(o => o.suggestedRestock),
                    itemStyle: { color: '#e01a22', borderRadius: [4, 4, 0, 0] },
                    barWidth: '28%'
                }]
            });
            bar.resize();

            // 收益预估（按门店显示的节省/增加）
            const gainChart = echarts.init(document.getElementById('optimizeGain'));
            const gainData = opt.map(o => ({
                name: o.store,
                value: Math.round((o.suggestedRestock - o.currentRestock) / o.currentRestock * 100)
            }));
            gainChart.setOption({
                tooltip: { trigger: 'axis', formatter: function(params) { const p = params[0];
                        return `${p.name}<br/>调整幅度: ${p.value}%`; } },
                grid: { left: '8%', right: '4%', top: '6%', bottom: '16%', containLabel: true },
                xAxis: { type: 'category', data: gainData.map(d => d.name), axisLabel: { rotate: 20, fontSize: 10 } },
                yAxis: { type: 'value', name: '%' },
                series: [{
                    type: 'bar',
                    data: gainData.map(d => d.value),
                    itemStyle: {
                        color: function(params) {
                            return params.value >= 0 ? '#e01a22' : '#2f855a';
                        },
                        borderRadius: [4, 4, 0, 0]
                    },
                    barWidth: '35%'
                }]
            });
            gainChart.resize();

            // 摘要文本
            const summary = `基于AI模型，对${data.city}的${opt.length}家门店进行补货优化分析。建议调整${opt.filter(o=>Math.abs(o.demandGap)>3).length}家门店的补货量，预计整体库存周转提升约${(Math.random()*8+5).toFixed(1)}%，缺货率降低${(Math.random()*3+1).toFixed(1)}%。`;
            document.getElementById('optimizeSummary').textContent = summary;

            window._charts.optimizeBar = bar;
            window._charts.optimizeGain = gainChart;
        }

        // ================================================================
        //  5. 切换城市 & 页面
        // ================================================================
        function switchCity(city) {
            if (currentCity === city) return;
            currentCity = city;
            renderAll();
            // 重新调整所有图表尺寸
            setTimeout(() => {
                Object.values(window._charts || {}).forEach(chart => { if (chart && chart.resize) chart.resize(); });
            }, 100);
        }

        function switchPage(page) {
            if (currentPage === page) return;
            currentPage = page;
            // 更新tab
            tabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.page === page);
            });
            // 显示页面
            Object.keys(pages).forEach(key => {
                pages[key].classList.toggle('active', key === page);
            });
            renderAll();
            setTimeout(() => {
                Object.values(window._charts || {}).forEach(chart => { if (chart && chart.resize) chart.resize(); });
            }, 150);
        }

        // ================================================================
        //  6. 事件绑定
        // ================================================================
        // 城市单选框
        cityRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.checked) switchCity(this.value);
            });
        });

        // 导航标签
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                switchPage(this.dataset.page);
            });
        });

        // 面包屑点击（首页回到总览）
        document.querySelector('.breadcrumb a').addEventListener('click', function(e) {
            e.preventDefault();
            switchPage('overview');
        });

        // ================================================================
        //  7. 窗口resize自适应
        // ================================================================
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                Object.values(window._charts || {}).forEach(chart => {
                    if (chart && chart.resize) chart.resize();
                });
            }, 200);
        });

        // ================================================================
        //  8. 初始化
        // ================================================================
        renderAll();
        console.log('✅ adidas Dashboard 多维度原型已加载，当前城市:', currentCity);
    </script>

</body>
</html>
